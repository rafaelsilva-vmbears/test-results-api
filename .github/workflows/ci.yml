name: Unit Tests & Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov pytest-mock

    - name: Run Unit Tests
      env:
        MASTER_KEY: ${{ secrets.MASTER_KEY }}
      run: |
        pytest tests/unit --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

    - name: Run Integration Tests
      if: success()
      env:
        MASTER_KEY: ${{ secrets.MASTER_KEY }}
      run: |
        pytest tests/integration --cov=app --cov-append --cov-report=term-missing --cov-report=xml

    - name: Run Component Tests
      if: success()
      run: |
        pytest tests/component --cov=app --cov-append --cov-report=term-missing --cov-report=xml

    - name: Coverage Comment
      uses: MishaKav/pytest-coverage-comment@main
      if: always() && github.event_name == 'pull_request'
      with:
        pytest-xml-coverage-path: ./coverage.xml


    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: |
          .coverage
          coverage.xml
