services:
  # Serviços locais para desenvolvimento (ativados com --profile local)
  mongodb:
    image: mongo:7.0
    profiles: [ "local" ]
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - test-results-network
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --eval \"db.adminCommand({ping:1})\" --quiet || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongo-express:
    image: mongo-express:1.0.2
    profiles: [ "local" ]
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD:-admin123}
    networks:
      - test-results-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # URI do MongoDB (Atlas ou local)
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/test_results}
      API_KEY: ${API_KEY:-}
      # Timeouts configuráveis via .env
      MONGO_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_SERVER_SELECTION_TIMEOUT_MS:-5000}
      MONGO_CONNECT_TIMEOUT_MS: ${MONGO_CONNECT_TIMEOUT_MS:-10000}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output
      - ./logs:/app/logs
    networks:
      - test-results-network
    command: [ "python", "run.py" ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
  mongodb_config:


networks:
  test-results-network:
    driver: bridge
